<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Bee Hexagon Flow</title>
  <style>
    :root {
      --bg-1: #0a0b10;
      --bg-2: #13161f;
      --ink: #f6d365;
      --ink-soft: rgba(246, 211, 101, 0.18);
      --honey: #ffbf3c;
      --amber: #ff9e1a;
      --wax: #fff2b0;
      --text: rgba(255, 244, 210, 0.92);
      --muted: rgba(255, 244, 210, 0.56);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at top, rgba(255, 195, 60, 0.07), transparent 36%),
        radial-gradient(circle at bottom, rgba(255, 166, 35, 0.06), transparent 28%),
        linear-gradient(180deg, var(--bg-2), var(--bg-1));
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .hud {
      position: fixed;
      left: 16px;
      top: 16px;
      z-index: 10;
      padding: 12px 14px;
      border: 1px solid rgba(255, 208, 92, 0.16);
      border-radius: 14px;
      background: rgba(10, 11, 16, 0.42);
      backdrop-filter: blur(12px);
      color: var(--text);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.22);
      pointer-events: none;
      max-width: min(320px, calc(100vw - 32px));
    }

    .hud h1 {
      margin: 0 0 6px;
      font-size: 14px;
      line-height: 1.2;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink);
      font-weight: 700;
    }

    .hud p {
      margin: 0;
      font-size: 13px;
      line-height: 1.45;
      color: var(--muted);
    }

    .badge {
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 10;
      padding: 10px 12px;
      font-size: 12px;
      color: rgba(255, 243, 212, 0.9);
      border: 1px solid rgba(255, 208, 92, 0.16);
      border-radius: 999px;
      background: rgba(10, 11, 16, 0.4);
      backdrop-filter: blur(12px);
      pointer-events: none;
    }

    @media (max-width: 640px) {
      .hud {
        left: 12px;
        top: 12px;
        padding: 10px 12px;
      }

      .hud h1 {
        font-size: 12px;
      }

      .hud p,
      .badge {
        font-size: 11px;
      }
    }
  </style>
</head>
<body>
  <div class="hud">
    <h1>Bee Hexagon Flow</h1>
    <p>Move the mouse to bend the hive. Hold to pull cells inward. Tap or click to send a honey pulse.</p>
  </div>
  <div class="badge">Mouse and touch enabled</div>
  <canvas id="scene"></canvas>

  <script>
    const canvas = document.getElementById('scene');
    const ctx = canvas.getContext('2d');

    const DPR = Math.min(window.devicePixelRatio || 1, 2);
    const TAU = Math.PI * 2;

    const state = {
      width: 0,
      height: 0,
      time: 0,
      hexRadius: 24,
      cells: [],
      sparks: [],
      ripples: [],
      pointer: {
        x: 0,
        y: 0,
        px: 0,
        py: 0,
        vx: 0,
        vy: 0,
        down: false,
        active: false,
        radius: 140
      }
    };

    function resize() {
      state.width = window.innerWidth;
      state.height = window.innerHeight;
      canvas.width = Math.floor(state.width * DPR);
      canvas.height = Math.floor(state.height * DPR);
      canvas.style.width = state.width + 'px';
      canvas.style.height = state.height + 'px';
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
      state.hexRadius = Math.max(14, Math.min(28, Math.min(state.width, state.height) * 0.024));
      buildHive();
    }

    function hexToPixel(q, r, size) {
      const x = size * (Math.sqrt(3) * q + Math.sqrt(3) / 2 * r);
      const y = size * (1.5 * r);
      return { x, y };
    }

    function buildHive() {
      state.cells.length = 0;
      const size = state.hexRadius;
      const cols = Math.ceil(state.width / (Math.sqrt(3) * size)) + 4;
      const rows = Math.ceil(state.height / (1.5 * size)) + 4;
      const qOffset = Math.floor(cols / 2);
      const rOffset = Math.floor(rows / 2);
      const cx = state.width * 0.5;
      const cy = state.height * 0.5;
      const maxDist = Math.min(state.width, state.height) * 0.46;

      for (let r = -rOffset; r < rows - rOffset; r++) {
        for (let q = -qOffset; q < cols - qOffset; q++) {
          const p = hexToPixel(q, r, size);
          const x = cx + p.x;
          const y = cy + p.y;
          const dx = x - cx;
          const dy = y - cy;
          const dist = Math.hypot(dx, dy);
          if (dist > maxDist) continue;

          const ring = dist / maxDist;
          state.cells.push({
            q,
            r,
            baseX: x,
            baseY: y,
            x: x + (Math.random() - 0.5) * 24,
            y: y + (Math.random() - 0.5) * 24,
            vx: 0,
            vy: 0,
            scale: 0.6 + Math.random() * 0.8,
            seed: Math.random() * 1000,
            ring,
            glow: Math.random(),
            fillPulse: Math.random(),
            occupied: Math.random() > 0.18
          });
        }
      }
    }

    function addRipple(x, y, force = 1) {
      state.ripples.push({ x, y, r: 8, life: 1, force });
      for (let i = 0; i < 28; i++) {
        const angle = Math.random() * TAU;
        const speed = 1 + Math.random() * 3.5 * force;
        state.sparks.push({
          x,
          y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          size: 1 + Math.random() * 2.8,
          life: 0.6 + Math.random() * 0.8,
          hueShift: Math.random()
        });
      }
    }

    function setPointer(x, y, active = true) {
      state.pointer.active = active;
      state.pointer.x = x;
      state.pointer.y = y;
    }

    function getClientPos(event) {
      const touch = event.touches?.[0] || event.changedTouches?.[0];
      return touch ? { x: touch.clientX, y: touch.clientY } : { x: event.clientX, y: event.clientY };
    }

    window.addEventListener('mousemove', (event) => {
      setPointer(event.clientX, event.clientY, true);
    }, { passive: true });

    window.addEventListener('mousedown', (event) => {
      state.pointer.down = true;
      setPointer(event.clientX, event.clientY, true);
      addRipple(event.clientX, event.clientY, 1.1);
    });

    window.addEventListener('mouseup', () => {
      state.pointer.down = false;
    });

    window.addEventListener('mouseleave', () => {
      state.pointer.active = false;
      state.pointer.down = false;
    });

    window.addEventListener('touchstart', (event) => {
      const p = getClientPos(event);
      state.pointer.down = true;
      setPointer(p.x, p.y, true);
      addRipple(p.x, p.y, 1.2);
    }, { passive: true });

    window.addEventListener('touchmove', (event) => {
      const p = getClientPos(event);
      setPointer(p.x, p.y, true);
    }, { passive: true });

    window.addEventListener('touchend', (event) => {
      const p = getClientPos(event);
      if (Number.isFinite(p.x) && Number.isFinite(p.y)) addRipple(p.x, p.y, 0.9);
      state.pointer.down = false;
    }, { passive: true });

    window.addEventListener('click', (event) => {
      addRipple(event.clientX, event.clientY, 1);
    });

    window.addEventListener('resize', resize);

    function updatePointer() {
      const p = state.pointer;
      p.vx += (p.x - p.px) * 0.12;
      p.vy += (p.y - p.py) * 0.12;
      p.vx *= 0.55;
      p.vy *= 0.55;
      p.px += p.vx;
      p.py += p.vy;
      if (!p.active) {
        p.px += (state.width * 0.5 - p.px) * 0.02;
        p.py += (state.height * 0.5 - p.py) * 0.02;
      }
    }

    function update(dt) {
      state.time += dt;
      updatePointer();

      for (let i = state.ripples.length - 1; i >= 0; i--) {
        const ripple = state.ripples[i];
        ripple.r += dt * 180 * ripple.force;
        ripple.life -= dt * 0.85;
        if (ripple.life <= 0) state.ripples.splice(i, 1);
      }

      for (let i = state.sparks.length - 1; i >= 0; i--) {
        const s = state.sparks[i];
        s.x += s.vx;
        s.y += s.vy;
        s.vx *= 0.985;
        s.vy *= 0.985;
        s.vy += 0.01;
        s.life -= dt * 1.25;
        if (s.life <= 0) state.sparks.splice(i, 1);
      }

      const p = state.pointer;
      const wobbleTime = state.time * 0.0012;

      for (const cell of state.cells) {
        const noiseA = Math.sin(wobbleTime * 1.8 + cell.seed);
        const noiseB = Math.cos(wobbleTime * 1.2 + cell.seed * 1.3);
        let tx = cell.baseX + noiseA * 4 * (1 - cell.ring);
        let ty = cell.baseY + noiseB * 4 * (1 - cell.ring);

        if (p.active) {
          const dx = p.px - cell.x;
          const dy = p.py - cell.y;
          const dist = Math.hypot(dx, dy) || 0.001;
          const reach = p.radius + (1 - cell.ring) * 40;
          if (dist < reach) {
            const falloff = 1 - dist / reach;
            const force = p.down ? 1.6 : -1.2;
            tx += (dx / dist) * falloff * 28 * force;
            ty += (dy / dist) * falloff * 28 * force;
            cell.glow = Math.min(1.5, cell.glow + falloff * 0.09);
          }
        }

        for (const ripple of state.ripples) {
          const dx = cell.x - ripple.x;
          const dy = cell.y - ripple.y;
          const dist = Math.hypot(dx, dy) || 0.001;
          const band = Math.abs(dist - ripple.r);
          if (band < 34) {
            const push = (1 - band / 34) * ripple.life * 18 * ripple.force;
            tx += (dx / dist) * push;
            ty += (dy / dist) * push;
            cell.fillPulse = Math.min(1.8, cell.fillPulse + 0.06);
          }
        }

        cell.vx += (tx - cell.x) * 0.08;
        cell.vy += (ty - cell.y) * 0.08;
        cell.vx *= 0.82;
        cell.vy *= 0.82;
        cell.x += cell.vx;
        cell.y += cell.vy;
        cell.glow *= 0.97;
        cell.fillPulse *= 0.975;
      }
    }

    function hexPath(x, y, r) {
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const angle = Math.PI / 6 + i * Math.PI / 3;
        const px = x + Math.cos(angle) * r;
        const py = y + Math.sin(angle) * r;
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.closePath();
    }

    function drawBackground() {
      ctx.clearRect(0, 0, state.width, state.height);

      const glow = ctx.createRadialGradient(
        state.width * 0.5,
        state.height * 0.5,
        0,
        state.width * 0.5,
        state.height * 0.5,
        Math.max(state.width, state.height) * 0.65
      );
      glow.addColorStop(0, 'rgba(255, 191, 60, 0.06)');
      glow.addColorStop(0.55, 'rgba(255, 159, 28, 0.02)');
      glow.addColorStop(1, 'rgba(0, 0, 0, 0)');
      ctx.fillStyle = glow;
      ctx.fillRect(0, 0, state.width, state.height);
    }

    function drawHive() {
      const baseR = state.hexRadius * 0.84;

      for (const cell of state.cells) {
        const pulse = 0.88 + Math.sin(state.time * 0.002 + cell.seed) * 0.03 + cell.fillPulse * 0.05;
        const r = baseR * cell.scale * pulse;
        const fillAlpha = cell.occupied ? 0.09 + cell.fillPulse * 0.08 : 0.025 + cell.fillPulse * 0.03;
        const strokeAlpha = 0.16 + cell.glow * 0.18;

        ctx.save();
        ctx.translate(cell.x, cell.y);
        ctx.rotate(Math.sin(state.time * 0.001 + cell.seed) * 0.03);

        hexPath(0, 0, r + 5);
        ctx.strokeStyle = `rgba(255, 190, 70, ${0.03 + cell.glow * 0.08})`;
        ctx.lineWidth = 8;
        ctx.stroke();

        hexPath(0, 0, r);
        ctx.fillStyle = cell.occupied
          ? `rgba(255, 191, 60, ${fillAlpha})`
          : `rgba(255, 236, 166, ${fillAlpha})`;
        ctx.fill();
        ctx.strokeStyle = `rgba(255, 214, 120, ${strokeAlpha})`;
        ctx.lineWidth = 1.1;
        ctx.stroke();

        if (cell.occupied) {
          hexPath(0, 0, r * 0.45);
          ctx.fillStyle = `rgba(255, 238, 173, ${0.04 + cell.fillPulse * 0.06})`;
          ctx.fill();
        }

        ctx.restore();
      }
    }

    function drawRipples() {
      for (const ripple of state.ripples) {
        ctx.beginPath();
        ctx.arc(ripple.x, ripple.y, ripple.r, 0, TAU);
        ctx.strokeStyle = `rgba(255, 191, 60, ${ripple.life * 0.25})`;
        ctx.lineWidth = 2 + ripple.life * 2;
        ctx.stroke();
      }
    }

    function drawSparks() {
      for (const s of state.sparks) {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.size, 0, TAU);
        ctx.fillStyle = s.hueShift > 0.4
          ? `rgba(255, 233, 157, ${Math.max(0, s.life) * 0.9})`
          : `rgba(255, 170, 40, ${Math.max(0, s.life) * 0.9})`;
        ctx.fill();
      }
    }

    function drawPointerAura() {
      const p = state.pointer;
      if (!p.active) return;
      const radius = p.radius * (p.down ? 0.9 : 1);
      const gradient = ctx.createRadialGradient(p.px, p.py, 0, p.px, p.py, radius);
      gradient.addColorStop(0, p.down ? 'rgba(255, 230, 155, 0.12)' : 'rgba(255, 190, 70, 0.12)');
      gradient.addColorStop(1, 'rgba(255, 190, 70, 0)');
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(p.px, p.py, radius, 0, TAU);
      ctx.fill();
    }

    let last = performance.now();
    function frame(now) {
      const dt = Math.min(0.033, (now - last) / 1000);
      last = now;
      update(dt);
      drawBackground();
      drawPointerAura();
      drawRipples();
      drawHive();
      drawSparks();
      requestAnimationFrame(frame);
    }

    resize();
    state.pointer.px = state.width * 0.5;
    state.pointer.py = state.height * 0.5;
    requestAnimationFrame(frame);
  </script>
</body>
</html>

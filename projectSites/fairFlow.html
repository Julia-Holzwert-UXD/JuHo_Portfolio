<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Julia Holzwert - Projects</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
</head>

<body data-project-slug="fairFlow">

  <section class="intro-block">
    <div class="intro-container">
      <h2 id="projectTitle"></h2>
      <p class="project-tags" id="projectTags"></p>
      <p id="projectMeta"></p>
    </div>
  </section>

  <section class="project-detail-section">
    <div class="project-detail-wrapper">
      <div class="project-text" id="projectText"></div>

      <div class="project-images">
        <div class="image-grid" id="projectImages"></div>
      </div>
    </div>
  </section>

  <section class="other-projects-section">
    <div class="other-projects-container">
      <h2>More Projects</h2>
      <div class="other-projects-grid" id="otherProjectsGrid"></div>
    </div>
  </section>

  <button id="toTop">↑</button>

  <script src="../projects-data.js"></script>
  <script src="../script.js"></script>
</body>

</html>
